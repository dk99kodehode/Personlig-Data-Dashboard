<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DATA DASHBOARD</title>
    <script src="javascript.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="dashboard">
      <h2>Personlig data dashboard</h2>
      <div>
        <select id="exercise-input" class="data">
          <option value="Running">Running</option id> 
          <option value="Lifting">Lifting</option>
          <option value="Mountain-Hiking">Mountain-Hiking</option>
          <option value="Cycling">Cycling</option>
        </select>
      </div>

      <div>
        <input
          type="number"
          placeholder="60 mins"
          id="duration-input"
          min="1"
          max="100"
          class="data"
        />
      </div>
      <div>
        <button id="submit-exercise">Submit</button>
        <button id="show-favorites">Favorites</button>
      </div>

      <section>
        <div>
          <h3>Previous Sessions</h3>
          <div id="sessions"></div>
        </div>
      </section>
    </section>
  </body>
</html>
